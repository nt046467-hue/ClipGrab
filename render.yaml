services:
  # Web Service (API) — the only URL the frontend ever talks to
  - type: web
    name: clipgrab-api
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: clipgrab-redis
          property: connectionString
      - key: YTDLP_COOKIES_CONTENT
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # The API proxies completed download files from the worker container.
      # Set this to the worker's Render URL after first deploy.
      # e.g. https://clipgrab-worker.onrender.com
      - key: WORKER_BASE_URL
        sync: false

  # Background Worker — runs as 'web' so it gets a public URL that the
  # API can reach server-to-server to proxy files. The browser NEVER
  # hits this URL directly; all traffic goes through the API above.
  - type: web
    name: clipgrab-worker
    runtime: docker
    plan: free
    dockerCommand: npx tsx backend/src/worker.ts
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: clipgrab-redis
          property: connectionString
      - key: YTDLP_COOKIES_CONTENT
        sync: false

# Redis instance
keyvalues:
  - name: clipgrab-redis
    plan: free
